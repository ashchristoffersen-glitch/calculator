<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kids Calculator</title>
  <style>
    :root {
      --gap: clamp(8px, 1.6vmin, 16px);
      --radius: clamp(16px, 3vmin, 28px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: "Comic Sans MS", "Chalkboard SE", "Baloo", system-ui, sans-serif;
      background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 50%, #4ade80 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      /* iPad touch niceties */
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .app {
      width: 100%;
      max-width: 720px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: clamp(8px, 2vmin, 20px);
      gap: var(--gap);
    }
    h1 {
      margin: 0;
      text-align: center;
      color: #fff;
      font-size: clamp(22px, 4.5vmin, 40px);
      text-shadow: 0 3px 0 rgba(0,0,0,0.18);
      letter-spacing: 1px;
    }
    #display {
      flex: 0 0 auto;
      min-height: clamp(70px, 16vmin, 140px);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      background: #ffffff;
      border-radius: var(--radius);
      padding: clamp(10px, 3vmin, 26px);
      font-size: clamp(28px, 8vmin, 64px);
      font-weight: bold;
      color: #3b2f63;
      box-shadow: 0 8px 0 rgba(0,0,0,0.15), inset 0 0 0 4px #ffe27a;
      word-break: break-all;
      overflow: hidden;
      text-align: right;
    }
    .keys {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 1fr;
      gap: var(--gap);
      min-height: 0;
    }
    button.key {
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: clamp(24px, 6vmin, 48px);
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(0,0,0,0.22);
      transition: transform 0.05s ease, box-shadow 0.05s ease;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }
    button.key:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.22);
    }
    /* Bounce/wiggle when tapped */
    @keyframes pop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.18) rotate(-4deg); }
      60%  { transform: scale(0.94) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    button.key.pop {
      animation: pop 0.32s ease;
    }
    @media (prefers-reduced-motion: reduce) {
      button.key.pop { animation: none; }
    }
    /* Number keys */
    .num { background: #ffb703; color: #4a2e00; }
    .num:active { background: #ffc733; }
    /* Operators */
    .op { background: #ff5d8f; }
    .op:active { background: #ff7da6; }
    /* Clear / backspace */
    .fn { background: #8338ec; }
    .fn:active { background: #9a55f5; }
    /* Equals */
    .eq { background: #06d6a0; color: #053a2c; }
    .eq:active { background: #2ee3b6; }

    .span2 { grid-column: span 2; }
    .rowspan2 { grid-row: span 2; }

    /* Confetti overlay sits above everything but ignores taps */
    #confetti {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
    /* A little celebratory wiggle for the display on = */
    @keyframes displayCheer {
      0% { transform: scale(1); }
      40% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    #display.cheer { animation: displayCheer 0.5s ease; }

    /* ===== Navigation tabs ===== */
    #topnav {
      flex: 0 0 auto;
      display: flex;
      gap: var(--gap);
      justify-content: center;
    }
    .tab {
      flex: 1 1 0;
      max-width: 240px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-weight: bold;
      font-size: clamp(16px, 3vmin, 26px);
      padding: clamp(8px, 1.6vmin, 16px);
      color: #5b3aa6;
      background: rgba(255,255,255,0.65);
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.18);
      touch-action: manipulation;
    }
    .tab.active {
      background: #fff;
      color: #d6336c;
    }

    /* ===== Views ===== */
    .view {
      display: none;
      flex: 1 1 auto;
      flex-direction: column;
      gap: var(--gap);
      min-height: 0;
    }
    .view.active { display: flex; }

    /* ===== Game ===== */
    .game-bar {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
    }
    .game-mode-label {
      color: #fff;
      font-size: clamp(18px, 3.6vmin, 30px);
      font-weight: bold;
      text-shadow: 0 2px 0 rgba(0,0,0,0.18);
    }
    .equation {
      flex: 0 0 auto;
      background: #fff;
      border-radius: var(--radius);
      padding: clamp(12px, 4vmin, 32px);
      text-align: center;
      font-size: clamp(30px, 8vmin, 70px);
      font-weight: bold;
      color: #3b2f63;
      box-shadow: 0 8px 0 rgba(0,0,0,0.15), inset 0 0 0 4px #ffe27a;
      word-break: break-word;
    }
    .equation .blank {
      display: inline-block;
      min-width: 1.4em;
      padding: 0 0.15em;
      border-bottom: 6px solid #ff5d8f;
      color: #d6336c;
    }
    .equation .blank.filled { border-bottom-color: #06d6a0; }
    .feedback {
      flex: 0 0 auto;
      text-align: center;
      min-height: 1.4em;
      font-size: clamp(18px, 4vmin, 32px);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 2px 0 rgba(0,0,0,0.18);
    }
    .feedback.good { color: #073b1e; text-shadow: none; }
    .feedback.bad  { color: #5a2a00; text-shadow: none; }
    .gkeys {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      gap: var(--gap);
      min-height: 0;
    }
    .gcheck { background: #06d6a0; color: #053a2c; }
    .gcheck:active { background: #2ee3b6; }
    .span3 { grid-column: span 3; }
  </style>
</head>
<body>
  <div class="app">
    <nav id="topnav">
      <button class="tab active" data-view="calc">🧮 Calculator</button>
      <button class="tab" data-view="game">🎮 Game</button>
    </nav>

    <!-- ===== Calculator view ===== -->
    <section id="calcView" class="view active">
      <div id="display">0</div>
      <div class="keys">
        <button class="key fn" data-action="clear">C</button>
        <button class="key op" data-op="÷">÷</button>
        <button class="key op" data-op="×">×</button>
        <button class="key fn" data-action="back">⌫</button>

        <button class="key num" data-num="7">7</button>
        <button class="key num" data-num="8">8</button>
        <button class="key num" data-num="9">9</button>
        <button class="key op" data-op="−">−</button>

        <button class="key num" data-num="4">4</button>
        <button class="key num" data-num="5">5</button>
        <button class="key num" data-num="6">6</button>
        <button class="key op" data-op="+">+</button>

        <button class="key num" data-num="1">1</button>
        <button class="key num" data-num="2">2</button>
        <button class="key num" data-num="3">3</button>
        <button class="key eq rowspan2" data-action="equals">=</button>

        <button class="key num span2" data-num="0">0</button>
        <button class="key num" data-num="00">00</button>
      </div>
    </section>

    <!-- ===== Game view ===== -->
    <section id="gameView" class="view">
      <div class="game-bar">
        <div class="game-mode-label">Plus ➕</div>
      </div>
      <div id="equation" class="equation">– + – = –</div>
      <div id="feedback" class="feedback">&nbsp;</div>
      <div class="gkeys">
        <button class="key num gnum" data-gnum="7">7</button>
        <button class="key num gnum" data-gnum="8">8</button>
        <button class="key num gnum" data-gnum="9">9</button>
        <button class="key num gnum" data-gnum="4">4</button>
        <button class="key num gnum" data-gnum="5">5</button>
        <button class="key num gnum" data-gnum="6">6</button>
        <button class="key num gnum" data-gnum="1">1</button>
        <button class="key num gnum" data-gnum="2">2</button>
        <button class="key num gnum" data-gnum="3">3</button>
        <button class="key fn" data-gaction="back">⌫</button>
        <button class="key num gnum" data-gnum="0">0</button>
        <button class="key fn" data-gaction="clear">C</button>
        <button class="key eq gcheck span3" data-gaction="check">Check ✓</button>
      </div>
    </section>
  </div>
  <canvas id="confetti"></canvas>

  <script>
    // ----- Calculator state -----
    // We keep the expression as a list of tokens, e.g. ["12", "+", "7"].
    // The whole expression stays visible until "=" is pressed (requirement #3).
    const display = document.getElementById('display');

    let tokens = [];      // e.g. ["12", "+", "7"]
    let current = '';     // the number currently being typed
    let showingResult = false;

    function expressionText() {
      const parts = tokens.slice();
      if (current !== '') parts.push(current);
      return parts.join(' ');
    }

    function render(text) {
      display.textContent = (text === undefined || text === '') ? '0' : text;
    }

    function update() {
      render(expressionText());
    }

    function inputNumber(n) {
      if (showingResult) { reset(); }
      if (current === '0') current = '';      // avoid leading zeros
      if (current === '' && n === '00') return;
      current += n;
      update();
    }

    function inputOperator(op) {
      if (showingResult) { showingResult = false; }
      if (current === '') {
        if (tokens.length === 0) return;          // can't start with an operator
        if (isOperator(tokens[tokens.length - 1])) {
          tokens[tokens.length - 1] = op;         // replace trailing operator
          update();
          return;
        }
      } else {
        tokens.push(current);
        current = '';
      }
      tokens.push(op);
      update();
    }

    function isOperator(t) {
      return t === '+' || t === '−' || t === '×' || t === '÷';
    }

    function backspace() {
      if (showingResult) { reset(); return; }
      if (current !== '') {
        current = current.slice(0, -1);
      } else if (tokens.length > 0) {
        const last = tokens.pop();
        if (!isOperator(last)) current = last.slice(0, -1);
      }
      update();
    }

    function reset() {
      tokens = [];
      current = '';
      showingResult = false;
      update();
    }

    function compute(values, ops) {
      // First pass: × and ÷ (left to right).
      let nums = [values[0]];
      let operators = [];
      for (let i = 0; i < ops.length; i++) {
        const op = ops[i];
        const val = values[i + 1];
        if (op === '×') {
          nums[nums.length - 1] = nums[nums.length - 1] * val;
        } else if (op === '÷') {
          nums[nums.length - 1] = nums[nums.length - 1] / val;
        } else {
          operators.push(op);
          nums.push(val);
        }
      }
      // Second pass: + and − (left to right).
      let result = nums[0];
      for (let i = 0; i < operators.length; i++) {
        if (operators[i] === '+') result += nums[i + 1];
        else result -= nums[i + 1];
      }
      return result;
    }

    function equals() {
      const all = tokens.slice();
      if (current !== '') all.push(current);
      while (all.length && isOperator(all[all.length - 1])) all.pop();
      if (all.length === 0) return false;
      if (all.length === 1) {
        current = all[0];
        tokens = [];
        update();
        return false;
      }
      const values = [];
      const ops = [];
      all.forEach((t, i) => { if (i % 2 === 0) values.push(parseFloat(t)); else ops.push(t); });
      let result = compute(values, ops);
      result = Math.round(result * 1000000) / 1000000;
      const exprStr = all.join(' ');
      display.textContent = exprStr + ' = ' + result;
      tokens = [];
      current = String(result);
      showingResult = true;
      return true;
    }

    // ----- Sounds (Web Audio API, generated in-browser, lightweight) -----
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    // A single short, soft note.
    function playNote(freq, startOffset, duration, type, peak) {
      const ctx = getAudio();
      if (!ctx) return;
      const t0 = ctx.currentTime + (startOffset || 0);
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      const vol = (peak === undefined ? 0.18 : peak);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    }
    // Cheerful "boop" for taps; pitch varies a little by key type.
    function playTap(kind) {
      const freqs = { num: 660, op: 540, fn: 420, back: 360 };
      playNote(freqs[kind] || 600, 0, 0.12, 'triangle', 0.16);
    }
    // Happy ascending arpeggio for "=".
    function playHappy() {
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((f, i) => playNote(f, i * 0.09, 0.22, 'triangle', 0.2));
    }

    function bounce(btn) {
      btn.classList.remove('pop');
      // Force reflow so the animation can restart on rapid taps.
      void btn.offsetWidth;
      btn.classList.add('pop');
    }

    // ----- Confetti / sparkles (lightweight canvas, no libraries) -----
    const confettiCanvas = document.getElementById('confetti');
    const cctx = confettiCanvas.getContext('2d');
    let confettiPieces = [];
    let confettiRAF = null;

    function sizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      confettiCanvas.width = Math.floor(window.innerWidth * dpr);
      confettiCanvas.height = Math.floor(window.innerHeight * dpr);
      cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', sizeCanvas);
    sizeCanvas();

    const CONFETTI_COLORS = ['#ff5d8f', '#ffb703', '#06d6a0', '#8338ec', '#3a86ff', '#ff006e', '#fb5607'];

    function launchConfetti() {
      const W = window.innerWidth;
      const n = 90;
      for (let i = 0; i < n; i++) {
        confettiPieces.push({
          x: W / 2 + (Math.random() - 0.5) * W * 0.5,
          y: window.innerHeight * 0.32,
          vx: (Math.random() - 0.5) * 9,
          vy: -7 - Math.random() * 9,
          size: 6 + Math.random() * 8,
          color: CONFETTI_COLORS[(Math.random() * CONFETTI_COLORS.length) | 0],
          rot: Math.random() * Math.PI,
          vrot: (Math.random() - 0.5) * 0.4,
          shape: Math.random() < 0.5 ? 'rect' : 'circle',
          life: 0
        });
      }
      if (!confettiRAF) confettiRAF = requestAnimationFrame(stepConfetti);
    }

    function stepConfetti() {
      cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      const gravity = 0.32;
      confettiPieces.forEach(p => {
        p.vy += gravity;
        p.vx *= 0.99;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vrot;
        p.life++;
        cctx.save();
        cctx.translate(p.x, p.y);
        cctx.rotate(p.rot);
        cctx.fillStyle = p.color;
        cctx.globalAlpha = Math.max(0, 1 - p.life / 130);
        if (p.shape === 'rect') {
          cctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        } else {
          cctx.beginPath();
          cctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          cctx.fill();
        }
        cctx.restore();
      });
      confettiPieces = confettiPieces.filter(p => p.life < 130 && p.y < window.innerHeight + 40);
      if (confettiPieces.length > 0) {
        confettiRAF = requestAnimationFrame(stepConfetti);
      } else {
        cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        confettiRAF = null;
      }
    }

    function celebrate() {
      launchConfetti();
      display.classList.remove('cheer');
      void display.offsetWidth;
      display.classList.add('cheer');
    }

    document.querySelectorAll('.key').forEach(btn => {
      btn.addEventListener('animationend', () => btn.classList.remove('pop'));
      btn.addEventListener('click', () => {
        bounce(btn);
        if (btn.dataset.num !== undefined) { playTap('num'); inputNumber(btn.dataset.num); }
        else if (btn.dataset.op !== undefined) { playTap('op'); inputOperator(btn.dataset.op); }
        else if (btn.dataset.action === 'clear') { playTap('fn'); reset(); }
        else if (btn.dataset.action === 'back') { playTap('back'); backspace(); }
        else if (btn.dataset.action === 'equals') { if (equals()) { playHappy(); celebrate(); } }
      });
    });

    // =====================================================================
    // GAME MODE
    // =====================================================================
    const equationEl = document.getElementById('equation');
    const feedbackEl = document.getElementById('feedback');

    const gameState = {
      mode: 'plus',     // CP5: Plus only
      level: 2,         // default level for now
      q: null,          // current question
      input: ''         // the digits the child has typed
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // + and − number range per level (table from PLAN.md).
    const ADD_RANGE = [10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000];
    function addRange(level) { return ADD_RANGE[level - 1] || 20; }

    // Build a Plus question: a + b = result, with one part missing.
    function generatePlus(level) {
      const max = addRange(level);
      const a = randInt(1, max);
      const b = randInt(1, max);
      return { op: '+', a: a, b: b, result: a + b };
    }

    function newQuestion() {
      const q = generatePlus(gameState.level);   // CP5: Plus only
      q.missing = ['a', 'b', 'result'][randInt(0, 2)];  // first / middle / result
      gameState.q = q;
      gameState.input = '';
      setFeedback('', '');
      renderEquation();
    }

    function cellHtml(key) {
      const q = gameState.q;
      if (q.missing === key) {
        const val = gameState.input;
        return '<span class="blank ' + (val ? 'filled' : '') + '">' + (val || '?') + '</span>';
      }
      return q[key];
    }

    function renderEquation() {
      const q = gameState.q;
      equationEl.innerHTML = cellHtml('a') + ' ' + q.op + ' ' + cellHtml('b') + ' = ' + cellHtml('result');
    }

    function setFeedback(text, cls) {
      feedbackEl.textContent = text || '\u00A0';
      feedbackEl.className = 'feedback' + (cls ? ' ' + cls : '');
    }

    function gInputNum(n) {
      if (gameState.input.length >= 6) return;
      if (gameState.input === '0') gameState.input = '';
      gameState.input += n;
      renderEquation();
    }
    function gBackspace() { gameState.input = gameState.input.slice(0, -1); renderEquation(); }
    function gClearInput() { gameState.input = ''; renderEquation(); }

    function gCheck() {
      if (gameState.input === '') { setFeedback('Type a number first! ✏️', 'bad'); return; }
      const answer = parseInt(gameState.input, 10);
      const correct = gameState.q[gameState.q.missing];
      if (answer === correct) {
        setFeedback('🎉 Great job!', 'good');
        playHappy();
        celebrate();
        setTimeout(newQuestion, 1500);
      } else {
        setFeedback('Try again! 💪', 'bad');
        playTap('back');
        gameState.input = '';
        renderEquation();
      }
    }

    // Game keypad
    document.querySelectorAll('[data-gnum], [data-gaction]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.gnum !== undefined) { playTap('num'); gInputNum(btn.dataset.gnum); }
        else if (btn.dataset.gaction === 'back') { playTap('back'); gBackspace(); }
        else if (btn.dataset.gaction === 'clear') { playTap('fn'); gClearInput(); }
        else if (btn.dataset.gaction === 'check') { gCheck(); }
      });
    });

    // ----- View navigation (Calculator <-> Game) -----
    function showView(view) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
      document.getElementById('calcView').classList.toggle('active', view === 'calc');
      document.getElementById('gameView').classList.toggle('active', view === 'game');
      if (view === 'game' && !gameState.q) newQuestion();
    }
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => { getAudio(); showView(tab.dataset.view); });
    });

    update();
  </script>
</body>
</html>
