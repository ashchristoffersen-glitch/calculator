<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kids Calculator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 20px; }
    #display {
      width: 100%;
      min-height: 48px;
      border: 2px solid #333;
      padding: 10px;
      font-size: 28px;
      margin-bottom: 12px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }
    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-width: 420px;
    }
    button {
      font-size: 24px;
      padding: 18px 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Kids Calculator</h1>
  <div id="display">0</div>
  <div class="keys">
    <button class="key" data-action="clear">C</button>
    <button class="key" data-op="÷">÷</button>
    <button class="key" data-op="×">×</button>
    <button class="key" data-action="back">⌫</button>

    <button class="key" data-num="7">7</button>
    <button class="key" data-num="8">8</button>
    <button class="key" data-num="9">9</button>
    <button class="key" data-op="−">−</button>

    <button class="key" data-num="4">4</button>
    <button class="key" data-num="5">5</button>
    <button class="key" data-num="6">6</button>
    <button class="key" data-op="+">+</button>

    <button class="key" data-num="1">1</button>
    <button class="key" data-num="2">2</button>
    <button class="key" data-num="3">3</button>
    <button class="key" data-action="equals" style="grid-row: span 2;">=</button>

    <button class="key" data-num="0" style="grid-column: span 3;">0</button>
  </div>

  <script>
    // ----- Calculator state -----
    // We keep the expression as a list of tokens, e.g. ["12", "+", "7"].
    // The whole expression stays visible until "=" is pressed (requirement #3).
    const display = document.getElementById('display');

    let tokens = [];      // e.g. ["12", "+", "7"]
    let current = '';     // the number currently being typed
    let showingResult = false;

    function expressionText() {
      const parts = tokens.slice();
      if (current !== '') parts.push(current);
      return parts.join(' ');
    }

    function render(text) {
      display.textContent = (text === undefined || text === '') ? '0' : text;
    }

    function update() {
      render(expressionText());
    }

    function inputNumber(n) {
      if (showingResult) { reset(); }
      // Avoid leading zeros like "007" -> "7"
      if (current === '0') current = '';
      current += n;
      update();
    }

    function inputOperator(op) {
      if (showingResult) {
        // Continue calculating from the result.
        showingResult = false;
      }
      if (current === '') {
        if (tokens.length === 0) return;          // can't start with an operator
        // Replace the last operator if user taps another operator.
        if (isOperator(tokens[tokens.length - 1])) {
          tokens[tokens.length - 1] = op;
          update();
          return;
        }
      } else {
        tokens.push(current);
        current = '';
      }
      tokens.push(op);
      update();
    }

    function isOperator(t) {
      return t === '+' || t === '−' || t === '×' || t === '÷';
    }

    function backspace() {
      if (showingResult) { reset(); return; }
      if (current !== '') {
        current = current.slice(0, -1);
      } else if (tokens.length > 0) {
        const last = tokens.pop();
        if (!isOperator(last)) current = last.slice(0, -1);
      }
      update();
    }

    function reset() {
      tokens = [];
      current = '';
      showingResult = false;
      update();
    }

    function compute(values, ops) {
      // values: array of numbers, ops: array of operators between them.
      // First pass: × and ÷ (left to right).
      let nums = [values[0]];
      let operators = [];
      for (let i = 0; i < ops.length; i++) {
        const op = ops[i];
        const val = values[i + 1];
        if (op === '×') {
          nums[nums.length - 1] = nums[nums.length - 1] * val;
        } else if (op === '÷') {
          nums[nums.length - 1] = nums[nums.length - 1] / val;
        } else {
          operators.push(op);
          nums.push(val);
        }
      }
      // Second pass: + and − (left to right).
      let result = nums[0];
      for (let i = 0; i < operators.length; i++) {
        if (operators[i] === '+') result += nums[i + 1];
        else result -= nums[i + 1];
      }
      return result;
    }

    function equals() {
      // Build full token list including the number being typed.
      const all = tokens.slice();
      if (current !== '') all.push(current);
      // Trim a trailing operator (e.g. "12 +" -> "12").
      while (all.length && isOperator(all[all.length - 1])) all.pop();
      if (all.length === 0) return;
      if (all.length === 1) { // just a single number
        current = all[0];
        tokens = [];
        update();
        return;
      }
      const values = [];
      const ops = [];
      all.forEach((t, i) => { if (i % 2 === 0) values.push(parseFloat(t)); else ops.push(t); });
      let result = compute(values, ops);
      // Round to avoid floating point noise, keep it whole-ish for kids.
      result = Math.round(result * 1000000) / 1000000;
      const exprStr = all.join(' ');
      display.textContent = exprStr + ' = ' + result;
      tokens = [];
      current = String(result);
      showingResult = true;
    }

    document.querySelectorAll('.key').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.num !== undefined) inputNumber(btn.dataset.num);
        else if (btn.dataset.op !== undefined) inputOperator(btn.dataset.op);
        else if (btn.dataset.action === 'clear') reset();
        else if (btn.dataset.action === 'back') backspace();
        else if (btn.dataset.action === 'equals') equals();
      });
    });

    update();
  </script>
</body>
</html>
